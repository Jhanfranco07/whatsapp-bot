x-app-environment: &app-environment
  APP_ENV: production
  DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-usil}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-usil_db}
  WHATSAPP_PROVIDER: bridge
  WHATSAPP_DRY_RUN: "false"
  BRIDGE_SEND_URL: http://bridge:3001/send
  INBOUND_API_KEY: ${INBOUND_API_KEY:?Define INBOUND_API_KEY in .env}
  ADMIN_API_KEY: ${ADMIN_API_KEY:?Define ADMIN_API_KEY in .env}
  RATE_LIMIT_MESSAGES: ${RATE_LIMIT_MESSAGES:-6}
  RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
  CAMPAIGN_MINIMUM_GAP_SECONDS: ${CAMPAIGN_MINIMUM_GAP_SECONDS:-60}

x-service-defaults: &service-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true
  logging:
    driver: json-file
    options:
      max-size: 10m
      max-file: "3"

services:
  postgres:
    <<: *service-defaults
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usil}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-usil_db}
    volumes:
      - usil_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usil} -d ${POSTGRES_DB:-usil_db}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    <<: *service-defaults
    build: .
    environment: *app-environment
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  bridge:
    <<: *service-defaults
    build: ./bridge
    environment:
      BRIDGE_API_URL: http://api:8000
      BRIDGE_OUTBOUND_HOST: 0.0.0.0
      BRIDGE_OUTBOUND_PORT: 3001
      INBOUND_API_KEY: ${INBOUND_API_KEY:?Define INBOUND_API_KEY in .env}
      BRIDGE_HEADLESS: "true"
      BRIDGE_MESSAGE_DEBOUNCE_SECONDS: ${BRIDGE_MESSAGE_DEBOUNCE_SECONDS:-3}
    volumes:
      - whatsapp_auth:/bridge/.wwebjs_auth
    expose:
      - "3001"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  worker:
    <<: *service-defaults
    build: .
    environment: *app-environment
    command: python scripts/process_outbound.py --watch --poll 1 --sent-delay 2
    depends_on:
      postgres:
        condition: service_healthy
      bridge:
        condition: service_healthy

volumes:
  usil_pgdata:
  whatsapp_auth:
